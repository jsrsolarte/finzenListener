name: Android CI/CD

on:
  push:
    tags:
      - 'v*' # Se activa cuando creas un tag como v1.1, v1.2, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :app:assembleDebug

    - name: Get Version Name
      id: get_version
      run: |
        VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F '"' '{print $2}')
        echo "VERSION=$VERSION_NAME" >> $GITHUB_ENV

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ env.VERSION }}
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/debug/finzenListener-v${{ env.VERSION }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
